<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CodingBoyz Terminal</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'JetBrains Mono',monospace;background:#000;color:#ff00aa;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.top{height:48px;min-height:48px;background:#050505;border-bottom:1px solid #1a0011;display:flex;align-items:center;justify-content:space-between;padding:0 12px}
.brand{font-size:15px;font-weight:800;color:#ff00aa;text-shadow:0 0 10px rgba(255,0,170,.5)}
.btns{display:flex;gap:6px}
.btn{padding:5px 10px;border-radius:5px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid rgba(255,0,170,.3);background:rgba(255,0,170,.1);color:#ff00aa;display:flex;align-items:center;gap:4px}
.btn:active{background:rgba(255,0,170,.3)}
.th{height:32px;min-height:32px;background:#050505;border-bottom:1px solid #1a0011;display:flex;align-items:center;padding:0 12px;font-size:11px;color:#660044;gap:6px}
.th-d{width:6px;height:6px;border-radius:50%;background:#ff00aa;box-shadow:0 0 8px #ff00aa}
.tc{flex:1;background:#000;position:relative}
.tc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#ff00aa,#ff66cc,#ff00aa);background-size:200%;animation:gs 2s linear infinite;z-index:10}
@keyframes gs{to{background-position:200%}}
#term{height:100%;padding:10px;font-family:'JetBrains Mono',monospace;font-size:14px;color:#ff00aa;overflow-y:auto;white-space:pre-wrap;word-wrap:break-word}
#term::-webkit-scrollbar{width:4px}#term::-webkit-scrollbar-thumb{background:#ff00aa;border-radius:3px}
.xterm{height:100%}.xterm-viewport{overflow-y:auto!important}
.sb{height:24px;min-height:24px;background:#050505;border-top:1px solid #1a0011;display:flex;align-items:center;justify-content:space-between;padding:0 12px;font-size:9px;color:#660044}
.sb-d{width:4px;height:4px;border-radius:50%;background:#ff00aa;display:inline-block;margin-right:4px}
#keyBtn{display:none;position:fixed;bottom:30px;right:16px;width:50px;height:50px;border-radius:50%;background:#ff00aa;color:#000;border:none;font-size:22px;font-weight:900;cursor:pointer;box-shadow:0 0 20px rgba(255,0,170,.6);z-index:9999}
@media(max-width:768px){#keyBtn{display:flex;align-items:center;justify-content:center}}
.cur{display:inline-block;width:8px;height:14px;background:#ff00aa;vertical-align:middle;animation:bl 1s step-end infinite}
@keyframes bl{50%{opacity:0}}
</style>
</head>
<body>
<div class="top"><div class="brand">⚡ CodingBoyz</div><div class="btns"><button class="btn" id="bkl">⚡ Kill</button><button class="btn" id="brb">🔄 Reboot</button></div></div>
<div class="th"><span class="th-d"></span><b style="color:#ff00aa">root@codingboyz</b>:~ — bash</div>
<div class="tc"><div id="term" onclick="document.getElementById('fakeIn').focus()"></div></div>
<div class="sb"><div><span class="sb-d"></span>Connected | PID: <span id="pid">----</span></div><div id="clk">--:--:--</div></div>
<input type="text" id="fakeIn" style="position:fixed;left:-9999px;opacity:0" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
<button id="keyBtn">⌨</button>
<script>
let term=null,ws=null,rc=0;
const $=id=>document.getElementById(id);
function toast(m){const t=document.createElement('div');t.style.cssText='position:fixed;top:10px;right:10px;background:rgba(255,0,170,.9);color:#000;padding:8px 12px;border-radius:5px;font-size:12px;font-weight:700;z-index:99999';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2000)}
function fallback(){const d=$('term');d.innerHTML='<span style="color:#ff00aa">root@codingboyz</span>:~# <span class="cur"></span>';let c='';const fi=$('fakeIn');fi.oninput=e=>{c=fi.value;d.innerHTML=`<span style="color:#ff00aa">root@codingboyz</span>:~# ${c}<span class="cur"></span>`};fi.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();if(ws&&ws.readyState===1)ws.send(c+'\n');c='';fi.value='';d.innerHTML='<span style="color:#ff00aa">root@codingboyz</span>:~# <span class="cur"></span>'}};term={write:v=>{const cl=v.replace(/\x1b\[[0-9;]*m/g,'');if(!cl.trim())return;d.innerHTML+='<br>'+cl+'<br><span style="color:#ff00aa">root@codingboyz</span>:~# <span class="cur"></span>';d.scrollTop=d.scrollHeight}}}
function initTerm(){if(typeof Terminal!=='undefined'){try{term=new Terminal({cursorBlink:true,cursorStyle:'block',fontSize:14,fontFamily:"'JetBrains Mono',monospace",theme:{background:'#000',foreground:'#ff00aa',cursor:'#ff00aa',green:'#ff00aa',blue:'#ff66cc',yellow:'#ffaadd',red:'#ff0055',cyan:'#ff00aa',magenta:'#ff00aa',white:'#ff00aa'},scrollback:5000,convertEol:true});term.open($('term'));function fit(){try{const p=$('term').parentElement;term.resize(Math.max(1,Math.floor(p.clientWidth/8.4)),Math.max(1,Math.floor(p.clientHeight/17)))}catch(e){}}window.addEventListener('resize',fit);setTimeout(fit,100);const fi=$('fakeIn');fi.oninput=()=>{if(ws&&ws.readyState===1)ws.send(fi.value);fi.value=''};fi.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault()}if(ws&&ws.readyState===1)ws.send(e.key)};term.onData(d=>{if(ws&&ws.readyState===1)ws.send(d)})}catch(e){fallback()}}else{fallback()}}
function conn(){const pr=location.protocol==='https:'?'wss:':'ws:';try{ws=new WebSocket(`${pr}//${location.host}`)}catch(e){return setTimeout(conn,2000)}ws.onopen=()=>{rc=0;$('pid').textContent=String(1000+Math.random()*9000|0)};ws.onmessage=e=>{if(term)term.write(e.data)};ws.onclose=()=>{if(rc<10){rc++;setTimeout(conn,2000*rc)}};ws.onerror=()=>{}}
 $('bkl').onclick=()=>{if(ws&&ws.readyState===1){ws.send('\x03');toast('Killed!')}else toast('Offline')};
 $('brb').onclick=()=>{if(ws&&ws.readyState===1){ws.send('__reboot__');toast('Rebooting...')}else toast('Offline')};
 $('keyBtn').onclick=()=>$('fakeIn').focus();
window.onload=()=>{initTerm();conn();setInterval(()=>$('clk').textContent=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'}),1000)};
</script>
</body>
</html>
